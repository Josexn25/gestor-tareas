{% extends "base.html" %}

{% block title %}Iniciar sesion{% endblock %}

{% block body %}
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="login-title">
      <p class="eyebrow">Acceso privado</p>
      <h1 id="login-title">Iniciar sesion</h1>
      <p class="subtitle">Entra para ver y administrar solo tus propias tareas.</p>

      <form class="auth-form" action="{{ url_for('auth.login_post') }}" method="post">
        <div class="field">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        </div>

        <div class="field">
          <label for="password">Contrasena</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="add-button" type="submit">Entrar</button>
      </form>

      <p class="auth-link">No tienes cuenta? <a href="{{ url_for('auth.register') }}">Crear cuenta</a></p>
    </section>
  </main>
{% endblock %}
