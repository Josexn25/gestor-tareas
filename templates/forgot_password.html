{% extends "base.html" %}

{% block title %}Recuperar contrasena{% endblock %}

{% block body %}
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="forgot-title">
      <p class="eyebrow">Recuperacion</p>
      <h1 id="forgot-title">Olvide mi contrasena</h1>
      <p class="subtitle">Escribe tu correo y te enviaremos un enlace seguro por 1 hora.</p>

      <form class="auth-form" action="{{ url_for('auth.forgot_password_post') }}" method="post">
        <div class="field">
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" autocomplete="email" required autofocus>
        </div>

        <button class="add-button" type="submit">Enviar enlace</button>
      </form>

      <p class="auth-link"><a href="{{ url_for('auth.login') }}">Volver al login</a></p>
    </section>
  </main>
{% endblock %}
