{% extends "base.html" %}

{% block title %}Nueva contrasena{% endblock %}

{% block body %}
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="reset-title">
      <p class="eyebrow">Enlace verificado</p>
      <h1 id="reset-title">Nueva contrasena</h1>
      <p class="subtitle">Cambia la contrasena para {{ email }}.</p>

      <form class="auth-form" action="{{ url_for('auth.reset_password_post', token=token) }}" method="post">
        <div class="field">
          <label for="password">Nueva contrasena</label>
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required autofocus>
        </div>

        <button class="add-button" type="submit">Guardar contrasena</button>
      </form>
    </section>
  </main>
{% endblock %}
